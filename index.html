<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('aa-portal-theme');
          document.documentElement.setAttribute('data-theme', t === 'light' || t === 'dark' ? t : 'dark');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>aa2000_portal</title>
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #000044;
          background: linear-gradient(to bottom right, #000044 0%, #000066 50%, #1a4d99 100%);
          color: white;
          font-family: system-ui, -apple-system, sans-serif;
          z-index: 9999;
        }
        .spinner {
          width: 40px;
          height: 40px;
          border: 3px solid rgba(255,255,255,0.2);
          border-top-color: #38bdf8;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; font-weight: 500; opacity: 0.8; letter-spacing: 0.05em; }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
        <div class="loading-text">AA2000 PORTAL</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
