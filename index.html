<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('aa-portal-theme');
          document.documentElement.setAttribute('data-theme', t === 'light' || t === 'dark' ? t : 'dark');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/avif" href="/logo.avif" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>aa2000_portal</title>
  </head>
  <body>
    <div id="root">
      <style>
        :root {
          --skel-bg: #0f172a;
          --skel-header: #12151a;
          --skel-sidebar: #161a20;
          --skel-border: rgba(255,255,255,0.08);
        }
        .initial-loader {
          position: fixed;
          inset: 0;
          display: flex;
          background: var(--skel-bg);
          z-index: 9999;
        }
        .skel-header {
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 4rem;
          background: var(--skel-header);
          border-bottom: 1px solid var(--skel-border);
          display: flex;
          align-items: center;
          padding: 0 1.5rem;
        }
        .skel-sidebar {
          width: 240px;
          background: var(--skel-sidebar);
          border-right: 1px solid var(--skel-border);
          margin-top: 4rem;
          height: calc(100vh - 4rem);
        }
        .skel-content {
          flex: 1;
          margin-top: 4rem;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .spinner {
          width: 32px;
          height: 32px;
          border: 3px solid rgba(255,255,255,0.1);
          border-top-color: #38bdf8;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
          .skel-sidebar { display: none; }
        }
      </style>
      <div class="initial-loader">
        <div class="skel-header">
          <div style="width: 120px; height: 20px; background: rgba(255,255,255,0.05); border-radius: 4px;"></div>
        </div>
        <div class="skel-sidebar"></div>
        <div class="skel-content">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
